name: yono_shield
description: "YONO Shield — Cybersecurity companion app that detects sideloaded fake banking apps and phishing SMS links."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Typography — Orbitron for cybersecurity headings, Inter for body text
  google_fonts: ^6.1.0

  # Shimmer effects for scanning animations
  shimmer: ^3.0.0

  # Default Flutter icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
