name: yono_shield
description: "YONO Shield — Cybersecurity companion app that detects sideloaded fake banking apps and phishing SMS links."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Typography — Orbitron for cybersecurity headings, Inter for body text
  google_fonts: ^6.1.0
  http: ^1.2.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  connectivity_plus: ^6.1.1

  # Shimmer effects for scanning animations
  shimmer: ^3.0.0

  # Text-to-Speech — Audio-Visual Red Alert for low-literacy users
  flutter_tts: ^4.2.0

  # Tinder-style card swiping — Gamified Scam Simulator
  appinio_swiper: ^2.1.1

  # Anti-Tapjacking — FLAG_SECURE blocks overlays, screenshots, screen recording
  # flutter_windowmanager removed: abandoned package, breaks AGP 8.7+
  # FLAG_SECURE is now set natively in MainActivity.kt

  # Hardware Attestation — Google Play Integrity API (TEE-backed)
  # Replaces flutter_jailbreak_detection (software root check easily bypassed by Magisk)
  # google_api_availability: pre-flight check that Play Services is available on device
  # The actual Play Integrity call is made via native MethodChannel → Kotlin
  google_api_availability: ^5.0.1

  # Default Flutter icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
